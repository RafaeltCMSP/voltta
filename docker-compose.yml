# Sobe o Postgres e o Redis que o Voltta precisa.
# A Evolution API roda separada (você já tem a sua).
#   docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: voltta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voltta
      POSTGRES_PASSWORD: voltta
      POSTGRES_DB: voltta
    ports:
      - "5432:5432"
    volumes:
      - voltta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voltta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voltta-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - voltta_redis:/data

volumes:
  voltta_pg:
  voltta_redis:
